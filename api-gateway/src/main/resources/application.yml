spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/auth/**
              - Path=/users/**

          - id: citizen-service
            uri: lb://CITIZEN-SERVICE
            predicates:
              - Path=/citizens/**

          - id: officer-service
            uri: lb://OFFICER-SERVICE
            predicates:
              - Path=/officers/**

          - id: grievance-service
            uri: lb://GRIEVANCE-SERVICE
            predicates:
              - Path=/grievances/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"