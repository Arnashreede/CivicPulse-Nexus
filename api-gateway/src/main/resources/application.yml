spring:
  application:
    name: api-gateway

  webmvc:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**,/users/**

        - id: citizen-service
          uri: lb://CITIZEN-SERVICE
          predicates:
            - Path=/citizens/**

        - id: grievance-service
          uri: lb://GRIEVANCE-SERVICE
          predicates:
            - Path=/grievances/**

      cors:
        mappings:
          "[/**]":
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"